# Coze CLI PR 预览部署
# 
# 功能：当创建或更新 Pull Request 时，自动创建预览环境
# 适用于：在合并到 main 之前预览功能和变更

name: 🎨 Coze PR Preview

on:
  pull_request:
    types: [ opened, synchronize, reopened ]
    branches: [ main ]

env:
  COZE_CLI_VERSION: 'latest'

jobs:
  preview:
    name: 🎨 创建 PR 预览
    runs-on: ubuntu-latest
    
    steps:
      # ----------------------------
      # 1. 基础设置
      # ----------------------------
      - name: 🚚 Checkout
        uses: actions/checkout@v4

      - name: 📦 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ----------------------------
      # 2. 安装 Coze CLI
      # ----------------------------
      - name: 🔧 安装 Coze CLI
        run: npm install -g @coze/cli@${{ env.COZE_CLI_VERSION }}

      # ----------------------------
      # 3. 认证
      # ----------------------------
      - name: 🔐 Coze 认证
        run: |
          coze auth login --token ${{ secrets.COZE_PAT }}
          coze space use ${{ secrets.COZE_SPACE_ID }}

      # ----------------------------
      # 4. 创建预览项目
      # ----------------------------
      - name: 📦 创建预览项目
        id: preview
        run: |
          PREVIEW_MESSAGE="🎨 PR 预览环境
          PR 编号：#${{ github.event.pull_request.number }}
          PR 标题：${{ github.event.pull_request.title }}
          作者：${{ github.event.pull_request.user.login }}
          来源分支：${{ github.head_ref }}
          目标分支：${{ github.base_ref }}
          "
          
          RESPONSE=$(coze code project create \
            --message "$PREVIEW_MESSAGE" \
            --type web \
            --format json)
          
          PROJECT_ID=$(echo "$RESPONSE" | jq -r '.project_id')
          echo "project_id=$PROJECT_ID" >> $GITHUB_OUTPUT
          echo "✅ 预览项目创建成功：$PROJECT_ID"

      # ----------------------------
      # 5. 发送开发指令
      # ----------------------------
      - name: 💬 发送开发指令
        run: |
          DEV_MESSAGE="## 🎨 PR Preview 开发任务

### PR 信息
- **编号**: #${{ github.event.pull_request.number }}
- **标题**: ${{ github.event.pull_request.title }}
- **作者**: @${{ github.event.pull_request.user.login }}
- **来源**: ${{ github.head_ref }} → ${{ github.base_ref }}

### 📝 PR 描述
${{ github.event.pull_request.body }}

### 🔗 链接
- PR: ${{ github.event.pull_request.html_url }}
- 对比: ${{ github.event.pull_request.diff_url }}
"
          
          coze code message send "$DEV_MESSAGE" -p ${{ steps.preview.outputs.project_id }}

      # ----------------------------
      # 6. 部署
      # ----------------------------
      - name: 🚀 部署预览
        run: |
          coze code deploy ${{ steps.preview.outputs.project_id }} --wait

      # ----------------------------
      # 7. 评论 PR
      # ----------------------------
      - name: 💬 更新 PR 评论
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🎨 Preview Deployed!

### 📦 Preview Info
- **Project ID**: \`${{ steps.preview.outputs.project_id }}\`
- **PR**: #${{ github.event.pull_request.number }}
- **Author**: @${{ github.event.pull_request.user.login }}

### 🔗 Links
- Coze Space: https://coze.cn/space/${{ secrets.COZE_SPACE_ID }}
- PR: ${{ github.event.pull_request.html_url }}

> 🤖 This preview was automatically generated by GitHub Actions`
            })
